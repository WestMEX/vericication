<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAULT — Autenticación de Producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #c8f135;
      --accent2: #ff3c3c;
      --warn: #ffb800;
      --text: #f0f0f0;
      --muted: #555;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 4px;
      color: var(--accent);
    }

    .logo span { color: var(--text); }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main { padding: 40px; max-width: 1100px; margin: 0 auto; }

    /* Hero section - verificación activa */
    #verify-section {
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 48px;
      margin-bottom: 40px;
      position: relative;
      overflow: hidden;
    }

    #verify-section::before {
      content: 'AUTH';
      position: absolute;
      right: -20px;
      top: -30px;
      font-family: var(--font-display);
      font-size: 10rem;
      color: rgba(200,241,53,0.03);
      letter-spacing: 10px;
      pointer-events: none;
    }

    .verify-idle, .verify-loading, .verify-result { display: none; }
    .verify-idle.active, .verify-loading.active, .verify-result.active { display: block; }

    .verify-idle {
      text-align: center;
      padding: 40px 0;
    }

    .nfc-icon {
      width: 80px; height: 80px;
      border: 2px solid var(--border);
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: scan-ring 3s infinite;
    }

    @keyframes scan-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,241,53,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(200,241,53,0); }
    }

    .nfc-icon svg { color: var(--accent); }

    .idle-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: var(--muted);
    }

    .idle-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* Loading */
    .verify-loading {
      text-align: center;
      padding: 40px 0;
    }

    .loader-bar {
      width: 100%;
      height: 2px;
      background: var(--border);
      margin: 24px 0;
      position: relative;
      overflow: hidden;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      left: -40%;
      top: 0;
      width: 40%;
      height: 100%;
      background: var(--accent);
      animation: loading 0.8s infinite linear;
    }

    @keyframes loading {
      from { left: -40%; }
      to { left: 100%; }
    }

    .loading-text {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Result */
    .result-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .result-badge {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 4px;
      padding: 8px 20px;
      border: 2px solid;
    }

    .result-badge.legit {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(200,241,53,0.05);
    }

    .result-badge.fake {
      color: var(--accent2);
      border-color: var(--accent2);
      background: rgba(255,60,60,0.05);
    }

    .result-badge.warn {
      color: var(--warn);
      border-color: var(--warn);
      background: rgba(255,184,0,0.05);
    }

    .result-title {
      font-family: var(--font-display);
      font-size: 3rem;
      letter-spacing: 2px;
    }

    .result-title.legit { color: var(--accent); }
    .result-title.fake { color: var(--accent2); }
    .result-title.warn { color: var(--warn); }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .result-cell {
      background: var(--bg);
      padding: 20px;
    }

    .cell-label {
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .cell-value {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-all;
    }

    .cell-value.accent { color: var(--accent); }
    .cell-value.danger { color: var(--accent2); }
    .cell-value.warning { color: var(--warn); }

    /* Scan count indicator */
    .scan-meter {
      margin-top: 24px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .scan-meter-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .scan-meter-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    /* Logs table */
    .section-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 6px;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.72rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 0.6rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    tbody tr {
      border-bottom: 1px solid rgba(30,30,30,0.5);
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }

    tbody td {
      padding: 12px 16px;
      color: var(--text);
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .tag-ok { color: var(--accent); border: 1px solid rgba(200,241,53,0.3); }
    .tag-warn { color: var(--warn); border: 1px solid rgba(255,184,0,0.3); }
    .tag-fake { color: var(--accent2); border: 1px solid rgba(255,60,60,0.3); }

    #scan-log-section { margin-top: 40px; }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      border: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .alert-banner {
      background: rgba(255,60,60,0.08);
      border: 1px solid rgba(255,60,60,0.3);
      padding: 16px 20px;
      margin-top: 16px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent2);
    }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      main { padding: 20px; }
      #verify-section { padding: 24px; }
      .result-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">VAULT<span>AUTH</span></div>
  <div class="status-dot">
    <div class="dot"></div>
    <span>Sistema activo</span>
  </div>
</header>

<main>
  <div id="verify-section">

    <!-- Estado: esperando escaneo -->
    <div class="verify-idle active" id="state-idle">
      <div class="nfc-icon">
        <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"/>
        </svg>
      </div>
      <div class="idle-title">Esperando escaneo NFC</div>
      <div class="idle-sub">Acerca tu gorra al lector</div>
    </div>

    <!-- Estado: cargando -->
    <div class="verify-loading" id="state-loading">
      <div class="loading-text">Verificando autenticidad...</div>
      <div class="loader-bar"></div>
      <div class="loading-text" id="loading-detail">Consultando base de datos</div>
    </div>

    <!-- Estado: resultado -->
    <div class="verify-result" id="state-result">
      <div class="result-header">
        <div class="result-badge" id="result-badge">AUTÉNTICO</div>
        <div class="result-title" id="result-title">VERIFICADO</div>
      </div>

      <div class="result-grid" id="result-grid">
        <!-- Se llena dinámicamente -->
      </div>

      <div class="scan-meter">
        <span class="scan-meter-label">Total de escaneos registrados</span>
        <span class="scan-meter-value" id="scan-count">—</span>
      </div>

      <div id="alert-container"></div>

      <button class="back-btn" onclick="resetToIdle()">← Nueva verificación</button>
    </div>

  </div>

  <!-- Historial de escaneos -->
  <div id="scan-log-section">
    <div class="section-title">LOG DE ESCANEOS</div>
    <div id="log-container">
      <div class="empty-state">Sin registros aún</div>
    </div>
  </div>
</main>

<script>
// ==========================================================
// CONFIGURACIÓN — Ajusta estos valores
// ==========================================================
const CONFIG = {
  // URL raw de tu archivo db.json en GitHub
  // Ejemplo: https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/db.json
  DB_URL: 'https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/db.json',

  // URL de tu GitHub Actions webhook o endpoint para escribir en db.json
  // Si usas solo GitHub Pages (read-only), deja vacío y los escaneos
  // se guardan en localStorage como demostración
  WRITE_URL: '',

  // Minutos entre los que 2 escaneos desde IPs distintas = sospechoso
  CLONE_ALERT_MINUTES: 5
};

// ==========================================================
// BASE DE DATOS LOCAL (fallback si no hay WRITE_URL)
// Estructura: { uid: { model, batch, created, scans: [] } }
// ==========================================================
function getLocalDB() {
  try {
    return JSON.parse(localStorage.getItem('vaultauth_db') || '{}');
  } catch { return {}; }
}

function saveLocalDB(db) {
  localStorage.setItem('vaultauth_db', JSON.stringify(db));
}

// ==========================================================
// LEER PARÁMETROS DE URL — ?uid=XXX&sig=YYY
// ==========================================================
function getURLParams() {
  const p = new URLSearchParams(window.location.search);
  return { uid: p.get('uid'), sig: p.get('sig') };
}

// ==========================================================
// VERIFICAR FIRMA (HMAC-SHA256 simple en cliente)
// El chip escribe: ?uid=UID&sig=HMAC(UID, SECRET)
// ==========================================================
async function verifySignature(uid, sig, secret) {
  try {
    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey(
      'raw', enc.encode(secret),
      { name: 'HMAC', hash: 'SHA-256' },
      false, ['verify']
    );
    const sigBytes = hexToBytes(sig);
    return await crypto.subtle.verify('HMAC', key, sigBytes, enc.encode(uid));
  } catch {
    return false;
  }
}

function hexToBytes(hex) {
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < hex.length; i += 2)
    bytes[i / 2] = parseInt(hex.substr(i, 2), 16);
  return bytes;
}

// ==========================================================
// MAIN — Verificación al cargar la página
// ==========================================================
window.addEventListener('load', async () => {
  await loadLogTable();

  const { uid, sig } = getURLParams();
  if (!uid || !sig) {
    showState('idle');
    return;
  }

  showState('loading');
  await runVerification(uid, sig);
});

async function runVerification(uid, sig) {
  setLoadingText('Buscando producto en base de datos...');

  let db = {};

  // Intentar cargar desde GitHub raw
  try {
    const r = await fetch(CONFIG.DB_URL + '?t=' + Date.now());
    if (r.ok) db = await r.json();
  } catch (_) {
    // Fallback a localStorage
    db = getLocalDB();
  }

  const product = db[uid];

  if (!product) {
    // UID no existe → falso
    recordScan(uid, sig, 'FALSO', 'UID no registrado', db);
    showResult({
      status: 'fake',
      badge: '⚠ NO REGISTRADO',
      title: 'PRODUCTO NO VÁLIDO',
      cells: [
        { label: 'UID', value: uid, cls: 'danger' },
        { label: 'Estado', value: 'No encontrado en base de datos', cls: 'danger' },
        { label: 'Acción', value: 'No compres este producto', cls: 'danger' },
      ],
      scans: 0,
      alert: null
    });
    return;
  }

  setLoadingText('Validando firma criptográfica...');

  // Verificar firma con el secret del producto
  const sigValid = await verifySignature(uid, sig, product.secret || uid + '_vault_secret');

  if (!sigValid) {
    recordScan(uid, sig, 'FALSO', 'Firma inválida — posible clonación', db);
    showResult({
      status: 'fake',
      badge: '⛔ FIRMA INVÁLIDA',
      title: 'CHIP CLONADO',
      cells: [
        { label: 'UID', value: uid, cls: 'danger' },
        { label: 'Modelo', value: product.model || '—' },
        { label: 'Lote', value: product.batch || '—' },
        { label: 'Estado', value: 'Firma criptográfica no coincide', cls: 'danger' },
      ],
      scans: (product.scans || []).length,
      alert: 'ALERTA: La firma de este chip no es válida. Posible falsificación o intento de clonación.'
    });
    return;
  }

  setLoadingText('Analizando historial de escaneos...');

  // Detectar clonación por doble escaneo
  const scans = product.scans || [];
  const now = Date.now();
  let cloneAlert = null;

  if (scans.length > 0) {
    const last = scans[scans.length - 1];
    const diffMin = (now - last.ts) / 60000;
    if (diffMin < CONFIG.CLONE_ALERT_MINUTES && last.ua !== navigator.userAgent) {
      cloneAlert = `ALERTA: Este chip fue escaneado hace ${Math.round(diffMin)} minuto(s) desde un dispositivo diferente. Posible clonación.`;
    }
  }

  recordScan(uid, sig, cloneAlert ? 'ALERTA' : 'OK', cloneAlert || 'Verificación exitosa', db);

  showResult({
    status: cloneAlert ? 'warn' : 'legit',
    badge: cloneAlert ? '⚡ ALERTA' : '✓ AUTÉNTICO',
    title: cloneAlert ? 'REVISAR' : 'VERIFICADO',
    cells: [
      { label: 'UID', value: uid, cls: 'accent' },
      { label: 'Modelo', value: product.model || '—' },
      { label: 'Lote', value: product.batch || '—' },
      { label: 'Fabricado', value: product.created || '—' },
      { label: 'Color', value: product.color || '—' },
      { label: 'Talla', value: product.size || '—' },
    ],
    scans: scans.length + 1,
    alert: cloneAlert
  });
}

// ==========================================================
// REGISTRAR ESCANEO
// ==========================================================
function recordScan(uid, sig, status, note, db) {
  if (!db[uid]) db[uid] = { scans: [] };
  if (!db[uid].scans) db[uid].scans = [];

  db[uid].scans.push({
    ts: Date.now(),
    status,
    note,
    ua: navigator.userAgent,
    date: new Date().toISOString()
  });

  saveLocalDB(db);

  // Guardar también en log global
  const globalLog = JSON.parse(localStorage.getItem('vaultauth_log') || '[]');
  globalLog.unshift({ uid, sig: sig.slice(0,8)+'...', status, note, date: new Date().toISOString() });
  localStorage.setItem('vaultauth_log', JSON.stringify(globalLog.slice(0, 200)));

  loadLogTable();
}

// ==========================================================
// UI HELPERS
// ==========================================================
function showState(state) {
  ['idle', 'loading', 'result'].forEach(s => {
    document.getElementById('state-' + s).classList.remove('active');
  });
  document.getElementById('state-' + state).classList.add('active');
}

function setLoadingText(t) {
  document.getElementById('loading-detail').textContent = t;
}

function showResult({ status, badge, title, cells, scans, alert }) {
  showState('result');

  const badgeEl = document.getElementById('result-badge');
  badgeEl.textContent = badge;
  badgeEl.className = 'result-badge ' + status;

  const titleEl = document.getElementById('result-title');
  titleEl.textContent = title;
  titleEl.className = 'result-title ' + status;

  const grid = document.getElementById('result-grid');
  grid.innerHTML = cells.map(c => `
    <div class="result-cell">
      <div class="cell-label">${c.label}</div>
      <div class="cell-value ${c.cls || ''}">${c.value}</div>
    </div>
  `).join('');

  document.getElementById('scan-count').textContent = scans;

  const alertC = document.getElementById('alert-container');
  alertC.innerHTML = alert
    ? `<div class="alert-banner">⚠ ${alert}</div>`
    : '';
}

function resetToIdle() {
  // Limpiar parámetros de URL sin recargar
  history.replaceState({}, '', window.location.pathname);
  showState('idle');
}

async function loadLogTable() {
  const log = JSON.parse(localStorage.getItem('vaultauth_log') || '[]');
  const container = document.getElementById('log-container');

  if (log.length === 0) {
    container.innerHTML = '<div class="empty-state">Sin registros aún</div>';
    return;
  }

  const tagClass = { OK: 'tag-ok', ALERTA: 'tag-warn', FALSO: 'tag-fake' };

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>UID</th>
          <th>Firma (parcial)</th>
          <th>Estado</th>
          <th>Nota</th>
        </tr>
      </thead>
      <tbody>
        ${log.map(e => `
          <tr>
            <td>${new Date(e.date).toLocaleString('es-MX')}</td>
            <td>${e.uid || '—'}</td>
            <td>${e.sig || '—'}</td>
            <td><span class="tag ${tagClass[e.status] || 'tag-warn'}">${e.status}</span></td>
            <td>${e.note}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ==========================================================
// DEMO: Simular escaneo desde URL manual
// Abre la consola del navegador y ejecuta: simulateScan()
// ==========================================================
window.simulateScan = async function(uid = 'GORRA-001') {
  const db = getLocalDB();
  if (!db[uid]) {
    // Registrar producto demo
    db[uid] = {
      model: 'Snapback Classic',
      batch: 'LOTE-2025-A',
      created: '2025-01',
      color: 'Negro / Lima',
      size: 'Talla única',
      secret: uid + '_vault_secret',
      scans: []
    };
    saveLocalDB(db);
  }

  // Generar firma válida
  const enc = new TextEncoder();
  const key = await crypto.subtle.importKey(
    'raw', enc.encode(uid + '_vault_secret'),
    { name: 'HMAC', hash: 'SHA-256' },
    false, ['sign']
  );
  const sigBuf = await crypto.subtle.sign('HMAC', key, enc.encode(uid));
  const sig = Array.from(new Uint8Array(sigBuf)).map(b => b.toString(16).padStart(2,'0')).join('');

  const url = `${window.location.origin}${window.location.pathname}?uid=${uid}&sig=${sig}`;
  console.log('URL de prueba:', url);
  window.location.href = url;
};
</script>
</body>
</html>
